version: '3.8'

x-airflow-common: &airflow-common
  build: .
  image: market-data-airflow:latest
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-airflow/airflow
    AIRFLOW__CORE__FERNET_KEY: 'ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg='
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'false'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth'
    AIRFLOW__CORE__DEFAULT_TIMEZONE: 'UTC'
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    # GCP configuration
    GCP_PROJECT_ID: ${GCP_PROJECT_ID:-}
    GCS_BUCKET: ${GCS_BUCKET:-}
    BQ_LOCATION: ${BQ_LOCATION:-US}
    # Airflow connection — auto-registered via env var (uses ADC from mounted gcloud config)
    AIRFLOW_CONN_GOOGLE_CLOUD_DEFAULT: google-cloud-platform://?project=${GCP_PROJECT_ID:-}&num_retries=3
    # API Keys (override via .env)
    MASSIVE_API_KEY: ${MASSIVE_API_KEY:-}
    COINGECKO_API_KEY: ${COINGECKO_API_KEY:-}
    # DBT
    DBT_PROFILES_DIR: /opt/airflow/dbt
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/plugins:/opt/airflow/plugins
    - ./airflow/logs:/opt/airflow/logs
    - ./dbt:/opt/airflow/dbt
    # ADC credentials — mount host gcloud config
    - ${GOOGLE_APPLICATION_CREDENTIALS_DIR:-~/.config/gcloud}:/home/airflow/.config/gcloud:ro
  depends_on:
    postgres-airflow:
      condition: service_healthy
  networks:
    - pipeline_net

services:
  # ─── Airflow metadata DB ───────────────────────────────────────────────────
  postgres-airflow:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_airflow_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    networks:
      - pipeline_net

  # ─── Airflow Init ─────────────────────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@pipeline.local \
          --password admin
        echo "Airflow initialized"
    depends_on:
      postgres-airflow:
        condition: service_healthy

  # ─── Airflow Webserver ────────────────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    command: >
      airflow webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ─── Airflow Scheduler ────────────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    command: >
      airflow scheduler
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      airflow-init:
        condition: service_completed_successfully

volumes:
  postgres_airflow_data:

networks:
  pipeline_net:
    driver: bridge
    name: pipeline_net
